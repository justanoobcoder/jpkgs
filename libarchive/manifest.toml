[package]
name = "libarchive"
version = "3.8.5"
description = "A library that provides a single interface for reading/writing various compression formats"
url = "https://github.com/libarchive/libarchive/releases/download/v3.8.5/libarchive-3.8.5.tar.xz"
sha256 = "d68068e74beee3a0ec0dd04aee9037d5757fcc651591a6dcf1b6d542fb15a703"

[build]
system = "autotools"
configure = "--prefix=/usr --disable-static"
install = "make DESTDIR=$DESTDIR install && ln -sfv bsdunzip $DESTDIR/usr/bin/unzip"
