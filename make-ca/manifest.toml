[package]
name = "make-ca"
version = "1.16.1"
description = "Public Key Infrastructure script for validating authenticity"
url = "https://github.com/lfs-book/make-ca/archive/v1.16.1/make-ca-1.16.1.tar.gz"
md5 = "bf9cea2d24fc5344d4951b49f275c595"

[dependencies]
requires = ["p11-kit"]

[build]
system = "make"
install = """
make DESTDIR=${DESTDIR} install
install -vdm755 ${DESTDIR}/etc/ssl/local
install -vdm755 ${DESTDIR}/etc/profile.d
cat > ${DESTDIR}/etc/profile.d/pythoncerts.sh << "EOF"
# Begin /etc/profile.d/pythoncerts.sh
export _PIP_STANDALONE_CERT=/etc/pki/tls/certs/ca-bundle.crt
# End /etc/profile.d/pythoncerts.sh
EOF
"""

[hooks]
pre_configure = "sed '/mktemp/s/-t //' -i make-ca"

post_install = """
/usr/sbin/make-ca -g
if command -v systemctl >/dev/null 2>&1; then
    systemctl enable update-pki.timer
fi
"""
