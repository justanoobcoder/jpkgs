[package]
name = "libxslt"
version = "1.1.45"
description = "XSLT library for GNOME"
url = "https://download.gnome.org/sources/libxslt/1.1/libxslt-1.1.45.tar.xz"
md5 = "84bb3f6ba7f5ee98af5dcd72e828c73e"

[dependencies]
requires = ["libxml2", "docbook-xml", "docbook-xsl-nons"]

[build]
system = "autotools"
configure = '''
    --prefix=/usr    \
    --disable-static \
    --without-python \
    --docdir=/usr/share/doc/libxslt-1.1.45
'''
