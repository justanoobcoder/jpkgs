[package]
name = "seatd"
version = "0.9.3"
description = "The seatd package provides a universal seat management library"
url = "https://git.sr.ht/~kennylevinsen/seatd/archive/0.9.3.tar.gz"
sha256 = "302564d54d8e28191fadfd734f2675ecb0c9e0615a58011b89ef15dfa4dbaa96"

[build]
system = "meson"
configure = '''
    --prefix=/usr             \
    --buildtype=release       \
    -D server=disabled        \
    -D libseat-seatd=disabled \
'''
