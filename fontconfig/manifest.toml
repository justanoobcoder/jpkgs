[package]
name = "fontconfig"
version = "2.18.1"
description = "A library and support programs used for configuring and customizing font access"
url = "https://gitlab.freedesktop.org/api/v4/projects/890/packages/generic/fontconfig/2.18.1/fontconfig-2.18.1.tar.xz"
md5 = "7c28095f89559d9bdef9d2e5d9d882f6"

[dependencies]
requires = ["freetype2"]

[build]
system = "autotools"
configure = '''
    --prefix=/usr        \
    --sysconfdir=/etc    \
    --localstatedir=/var \
    --disable-docs       \
    --docdir=/usr/share/doc/fontconfig-2.18.1
'''
install = '''
make DESTDIR=$DESTDIR install

install -v -dm755 \
        $DESTDIR/usr/share/{man/man{1,3,5},doc/fontconfig-2.18.1} &&
install -v -m644 fc-*/*.1         $DESTDIR/usr/share/man/man1 &&
install -v -m644 doc/*.3          $DESTDIR/usr/share/man/man3 &&
install -v -m644 doc/fonts-conf.5 $DESTDIR/usr/share/man/man5 &&
install -v -m644 doc/*.{pdf,sgml,txt,html} \
                                  $DESTDIR/usr/share/doc/fontconfig-2.18.1
'''
